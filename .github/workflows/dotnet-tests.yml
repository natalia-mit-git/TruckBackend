name: .NET Tests

on:
  push:
    branches: "main"
    paths:
      - '**/*.cs'
      - '**/*.csproj'
      - '.github/workflows/**'
  pull_request:
    branches: "main"
    paths:
      - '**/*.cs'
      - '**/*.csproj'
      - '.github/workflows/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    - name: Run tests
      run: dotnet test TruckBackend.Tests/TruckBackend.Tests.csproj --no-build --verbosity normal
