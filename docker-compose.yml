version: '3.8'

services:
  app:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: dotnet run
    ports:
    - "5000:5000"
    environment:
    - ASPNETCORE_URLS=http://0.0.0.0:5000
    depends_on:
      - postgres

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: truckdb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"

volumes:
  postgres-data: