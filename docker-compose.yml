version: '3.8'

services:
  app:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: sleep infinity
    depends_on:
      - postgres

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: truckdb
    ports:
      - "5432:5432"
  